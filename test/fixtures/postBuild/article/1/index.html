<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grandmas Home</title>
    <!-- Load the template dynamically -->
    <script>
        (function() {
            // Store the ID in a global variable for the template to use
            window.CURRENT_ARTICLE_ID = "1";
            
            // Fetch the template and replace the current document
            fetch('../_param/index.html')
                .then(response => response.text())
                .then(html => {
                    // Write the template HTML
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(error => {
                    console.error('Failed to load template:', error);
                    document.body.innerHTML = '<h1>Error loading article</h1><p>Please refresh the page</p>';
                });
        })();
    </script>
    
    <!-- Fallback for noscript -->
    <noscript>
        <meta http-equiv="refresh" content="0; url=../_param/index.html?id=1">
    </noscript>
</head>
<body>
    <p>Loading article 1... <a href="../_param/index.html?id=1">Click here if not redirected</a></p>
</body>
</html>
